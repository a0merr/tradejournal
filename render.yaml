# Render Blueprint — one-click deploy of the whole stack.
# In the Render dashboard: New + > Blueprint > connect this repo. Render reads this file
# and provisions a managed Postgres, the Spring Boot API (Docker), and the static frontend.
#
# NOTE: the two onrender.com URLs below assume the service names resolve as-is. If Render
# appends a suffix (because a name is taken), update VITE_API_BASE_URL and
# TRADEJOURNAL_CORS_ORIGINS to the actual URLs Render assigns, then redeploy.

databases:
  - name: tradejournal-db
    databaseName: tradejournal
    user: tradejournal
    plan: free

services:
  # --- Spring Boot API (Docker) ---
  - type: web
    name: tradejournal-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev          # loads the demo seed so the live demo has data
      - key: DB_HOST
        fromDatabase: { name: tradejournal-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: tradejournal-db, property: port }
      - key: DB_NAME
        fromDatabase: { name: tradejournal-db, property: database }
      - key: DB_USER
        fromDatabase: { name: tradejournal-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: tradejournal-db, property: password }
      - key: TRADEJOURNAL_JWT_SECRET
        generateValue: true   # Render generates a strong 256-bit secret
      - key: TRADEJOURNAL_CORS_ORIGINS
        value: https://tradejournal-web.onrender.com

  # --- React frontend (static) ---
  - type: web
    name: tradejournal-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://tradejournal-api.onrender.com
    routes:
      # SPA fallback: serve index.html for client-side routes
      - type: rewrite
        source: /*
        destination: /index.html
