services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradejournal
      POSTGRES_USER: tradejournal
      POSTGRES_PASSWORD: tradejournal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradejournal -d tradejournal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tradejournal
      SPRING_DATASOURCE_USERNAME: tradejournal
      SPRING_DATASOURCE_PASSWORD: tradejournal
      TRADEJOURNAL_JWT_SECRET: change-me-in-prod-this-is-a-dev-only-256-bit-secret-key
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      # The Vite dev server (inside this container) proxies /api to the backend service.
      VITE_API_BASE_URL: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  pgdata:
