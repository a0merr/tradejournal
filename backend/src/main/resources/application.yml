spring:
  application:
    name: tradejournal
  datasource:
    # Either set SPRING_DATASOURCE_URL directly (docker-compose), or supply the
    # discrete DB_* parts (Render wires these from the managed database).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tradejournal}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:tradejournal}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:tradejournal}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

tradejournal:
  jwt:
    secret: ${TRADEJOURNAL_JWT_SECRET:dev-only-secret-please-override-with-a-256-bit-value-in-prod}
    expiration-minutes: 120
  cors:
    # Comma-separated list of origins allowed to call the API (the deployed frontend).
    allowed-origins: ${TRADEJOURNAL_CORS_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration,classpath:db/seed
