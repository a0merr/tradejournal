spring:
  application:
    name: tradejournal
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tradejournal}
    username: ${SPRING_DATASOURCE_USERNAME:tradejournal}
    password: ${SPRING_DATASOURCE_PASSWORD:tradejournal}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

tradejournal:
  jwt:
    secret: ${TRADEJOURNAL_JWT_SECRET:dev-only-secret-please-override-with-a-256-bit-value-in-prod}
    expiration-minutes: 120

springdoc:
  swagger-ui:
    path: /swagger-ui

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration,classpath:db/seed
